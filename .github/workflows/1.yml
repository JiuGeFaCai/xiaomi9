name: GKI Build SuKiSu SUSFS
on:
  workflow_dispatch:
    inputs:
      ci_VERSION:
        description: "谷歌ci版本"
        required: true
        default: ''
      ANDROID_VERSION:
        description: "内核安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      KERNEL_NAME:
        type: string
        description: "自定义内核后缀 (留空则使用随机字符串)"
        required: false
        default: ""
      BUILD_TIME:
        type: string
        description: "自定义构建时间 (输入F使用当前时间)"
        required: false
        default: "Sun Jun 15 14:56:02 UTC 2025"
      sukisu_tag:
        description: "自定义版本来源后缀"
        required: false
        default: "闲鱼-搞机英雄-禁止黑灰违法犯罪倒卖"
      enable_patch:
       description: "是否启用6.6.30补丁"
       required: false
       default: false
       type: boolean
      enable_oneplus:
       description: "是否启用一加开机补丁"
       required: false
       default: false
       type: boolean
      enable_lsm:
       description: "lsm"
       required: false
       default: false
       type: boolean
      enable_Unicode_bypass_Fix:
       description: "零宽字符漏洞的修复补丁"
       required: false
       default: false
       type: boolean
      LSM:
        type: boolean
        description: "是否启用关键分区写入保护模块(BBG)？"
        required: true
        default: false
      ZRAM:
        type: boolean
        description: "是否启用添加更多的ZRAM算法？"
        required: true
        default: false
      sus_enable:
        type: boolean
        description: "是否切换sus提交"
        required: true
        default: false
      ksu_variant:
        description: "KernelSU 变体"
        type: choice
        options:
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      sukisu_version:
        description: "SukiSU/ReSukiSU 分支或提交"
        required: true
        default: "main"
      sus_version:
        description: "sus分支"
        required: true
        default: "123456789"
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          
      - name: Configure Git
        run: |
         git config --global user.name "build"
         git config --global user.email "123456@qq.com"

      - name: Install dependencies
        run: |
         sudo apt-mark hold firefox
         sudo apt update
         sudo apt install -y curl ccache git python3 repo libelf-dev
        
      - name: Install repo tool
        run: |
         curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
         chmod a+x ~/repo
         sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
         mkdir kernel_workspace && cd kernel_workspace
         FORMATTED_BRANCH="${{ github.event.inputs.ci_VERSION }}"
         repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16
         REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
         DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
         if grep -q deprecated <<< $REMOTE_BRANCH; then
         echo "Found deprecated branch: ${FORMATTED_BRANCH}"
         sed -i 's/"'${FORMATTED_BRANCH}'"/"deprecated\/'${FORMATTED_BRANCH}'"/g' $DEFAULT_MANIFEST_PATH
         cat $DEFAULT_MANIFEST_PATH
         fi
         repo --version
         repo --trace sync -c -j$(nproc --all) --no-tags --fail-fast

         rm common/android/abi_gki_protected_exports_* || echo "No protected exports!"
         
         
         
      - name: Set up KernelSU
        run: |
         cd kernel_workspace
         KSU_VARIANT="${{ github.event.inputs.ksu_variant }}"
         KSU_REF="${{ github.event.inputs.sukisu_version }}"
         if [ -z "$KSU_REF" ] || [ "$KSU_REF" = "builtin" ]; then
           KSU_REF="main"
         fi
         case "$KSU_VARIANT" in
           "SukiSU")
             echo "添加 SukiSU..."
             curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$KSU_REF"
             ;;
           "ReSukiSU")
             echo "添加 ReSukiSU..."
             curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s "$KSU_REF"
             ;;
           *)
             echo "未知 KernelSU 变体: $KSU_VARIANT"
             exit 1
             ;;
         esac
         cd KernelSU
         TAG_SUFFIX="${{ github.event.inputs.sukisu_tag }}"
         # 使用正确变量名 KSU_VERSION_API 替换函数体
         # sed -i "s|\$(shell cd \$(KSU_SRC); \$(GIT_BIN) rev-parse --abbrev-ref HEAD)|$TAG_SUFFIX|g" kernel/Kbuild
         KSU_VERSION=$(expr $(git rev-list --count HEAD) + 30700 2>/dev/null || echo 114514)
         echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
         echo "KSUVARIANT=$KSU_VARIANT" >> $GITHUB_ENV
         export KSU_VERSION=$KSU_VERSION
         echo "Injected custom version: v${KSU_VERSION}@${TAG_SUFFIX}"
         
         
      - name: Set up susfs
        run: |
           cd kernel_workspace
           git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}
            if [ "${{ github.event.inputs.sus_enable }}" = "true" ]; then
              echo "正在切换到sus提交"
              cd susfs4ksu
              git checkout ${{ github.event.inputs.sus_version }}
              cd ..
            fi
           
           
           git clone https://github.com/ShirkNeko/SukiSU_patch.git
           cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch ./common/
           cp susfs4ksu/kernel_patches/fs/* ./common/fs/
           cp susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

           if [ "${{ github.event.inputs.ZRAM }}" = "true" ]; then
            echo "正在拉取zram补丁"
            cp -r SukiSU_patch/other/zram/lz4k/include/linux/* ./common/include/linux/
            cp -r SukiSU_patch/other/zram/lz4k/lib/* ./common/lib/
            cp -r SukiSU_patch/other/zram/lz4k/crypto/* ./common/crypto/
            cp -r SukiSU_patch/other/zram/lz4k_oplus ./common/lib/
           fi

           # Apply patches
           cd ./common
           if ${{inputs.enable_patch }}; then
           sed -i 's/-32,12 +32,38/-32,11 +32,37/g' 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch
           sed -i '/#include <trace\/hooks\/fs.h>/d' 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch
           fi
           
           # Fake Patch to fix failures
           fake_patched=0
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android15" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.6" ]; then
            if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              echo "未找到 nr_subpages,正在进行补丁修复"
              sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
              fake_patched=1
            fi
           fi
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android12" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "未找到 vma_pages,正在进行补丁修复"
              fake_patched=1
            fi
           fi
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android13" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "未找到 vma_pages,正在进行补丁修复"
              fake_patched=1
            fi
           fi
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android13" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.15" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "未找到 vma_pages,正在进行补丁修复"
              fake_patched=1
            fi
           fi
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android14" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.1" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "未找到 vma_pages,正在进行补丁修复"
              fake_patched=1
            fi
           fi
           if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android15" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.6" ]; then
            if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "未找到 vma_pages,正在进行补丁修复"
              fake_patched=1
            fi
           fi

           memory_fake_patched=0
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android13" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.15" ]; then
              if grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c && ! grep -qF '#include <linux/susfs_def.h>' ./mm/memory.c; then
                echo "临时移除 swap_slots.h 以修复 mm/memory.c hunk"
                sed -i '/#include <linux\/swap_slots\.h>/d' ./mm/memory.c
                memory_fake_patched=1
              fi
            fi

           patch -p1 -F 3 < 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch || true

           # Revert
           if [ "$fake_patched" = 1 ]; then
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android15" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.6" ]; then
              if grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
                sed -i -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c
              fi
            fi
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android12" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ]; then
              if grep -qxF $'\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android13" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.10" ]; then
              if grep -q 'goto[[:space:]]\+show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android13" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "5.15" ]; then
              if grep -q 'goto[[:space:]]\+show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android14" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.1" ]; then
              if grep -q 'goto[[:space:]]\+show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
            if [ "${{ github.event.inputs.ANDROID_VERSION }}" = "android15" ] && [ "${{ github.event.inputs.KERNEL_VERSION }}" = "6.6" ]; then
              if grep -qxF $'\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
           fi

           if [ "$memory_fake_patched" = 1 ]; then
              sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_MAP/i #include <linux/swap_slots.h>' ./mm/memory.c
              echo "已还原 swap_slots.h"
            fi

      - name: Fix ReSukiSU SUSFS compatibility
        if: ${{ github.event.inputs.ksu_variant == 'ReSukiSU' }}
        run: |
          cd kernel_workspace
          set -euo pipefail
          echo "ReSukiSU SUSFS compat cwd: $(pwd)"
          python3 - <<'PY'
          from pathlib import Path

          def preprocessor_delta(text):
              opens = 0
              closes = 0
              for line in text.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("#if"):
                      opens += 1
                  elif stripped.startswith("#endif"):
                      closes += 1
              return opens - closes

          candidates = []
          seen = set()
          for base in (Path("KernelSU/kernel"), Path("common/drivers/kernelsu"), Path("drivers/kernelsu")):
              resolved = base.resolve()
              if resolved in seen:
                  continue
              markers = ["Kbuild", "core/init.c", "feature/sucompat.c", "sulog/event.c"]
              if any((base / marker).exists() for marker in markers):
                  candidates.append(base)
                  seen.add(resolved)

          if not candidates:
              raise SystemExit("未找到实际 ReSukiSU 源码目录，无法应用 SUSFS 兼容修复")

          for kernel_dir in candidates:
              print(f"检查 ReSukiSU SUSFS 源码目录: {kernel_dir}")
              ksu_c = kernel_dir / "ksu.c"
              tree_text = "\n".join(
                  path.read_text(errors="ignore")
                  for path in kernel_dir.rglob("*")
                  if path.is_file()
              )

              true_symbols = [
                  "ksu_is_init_rc_hook_enabled",
                  "ksu_is_input_hook_enabled",
              ]
              false_symbols = [
                  "ksu_init_rc_hook_key_false",
                  "ksu_input_hook_key_false",
              ]

              missing_true = [
                  sym for sym in true_symbols
                  if f"DEFINE_STATIC_KEY_TRUE({sym}" not in tree_text
              ]
              missing_false = [
                  sym for sym in false_symbols
                  if f"DEFINE_STATIC_KEY_FALSE({sym}" not in tree_text
              ]

              if not missing_true and not missing_false:
                  print("ReSukiSU SUSFS static key definitions already exist.")
              elif not ksu_c.exists():
                  print(f"  {kernel_dir} 未提供 ksu.c，跳过 static key 注入")
              else:
                  text = ksu_c.read_text()
                  anchor = '#include "infra/kernel_compat.h"\n'
                  if anchor not in text:
                      print(f"  {ksu_c} 未找到 kernel_compat.h include anchor，跳过 static key 注入")
                  else:
                      block = [
                          "",
                          "/* ABK: ReSukiSU builtin SUSFS expects these inline hook static keys. */",
                          "#ifdef CONFIG_KSU_SUSFS",
                      ]
                      block.extend(f"DEFINE_STATIC_KEY_TRUE({sym});" for sym in missing_true)
                      if missing_false:
                          block.append("#if defined(KSU_COMPAT_USE_STATIC_KEY)")
                          block.extend(f"DEFINE_STATIC_KEY_FALSE({sym});" for sym in missing_false)
                          block.append("#endif")
                      block.extend(["#endif", ""])
                      ksu_c.write_text(text.replace(anchor, anchor + "\n".join(block), 1))
                      print("Injected missing ReSukiSU SUSFS static key definitions:", ", ".join(missing_true + missing_false))

              selinux_c = kernel_dir / "selinux/selinux.c"
              if selinux_c.exists():
                  text = selinux_c.read_text()
                  compat_symbols = [
                      "ksu_selinux_hide_running",
                      "struct selinux_state fake_state",
                      "struct selinux_policy *backup_sepolicy",
                      "security_context_to_sid_with_policy",
                      "security_sid_to_context_with_policy",
                      "security_compute_av_user_with_policy",
                  ]
                  if not all(symbol in tree_text for symbol in compat_symbols):
                      anchor = "u32 ksu_file_sid __read_mostly = 0;\n"
                      block = "\n".join([
                          "",
                          "/* ABK: simonpunk SUSFS SELinux hooks reference KernelSU selinux_hide globals. */",
                          "#ifdef CONFIG_KSU_SUSFS",
                          "struct selinux_state fake_state;",
                          "bool ksu_selinux_hide_running __read_mostly = false;",
                          "struct selinux_policy *backup_sepolicy;",
                          "#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 6, 0)",
                          "int security_context_to_sid_with_policy(struct selinux_policy *policy, const char *scontext, u32 scontext_len,",
                          "                                        u32 *sid, u32 def_sid, unsigned int gfp_flags)",
                          "{",
                          "    return -22;",
                          "}",
                          "int security_sid_to_context_with_policy(struct selinux_policy *policy, u32 sid, char **scontext,",
                          "                                        u32 *scontext_len)",
                          "{",
                          "    return -22;",
                          "}",
                          "void security_compute_av_user_with_policy(struct selinux_policy *policy, u32 ssid, u32 tsid, u16 tclass,",
                          "                                          struct av_decision *avd)",
                          "{",
                          "}",
                          "#endif",
                          "#endif",
                          "",
                      ])
                      if anchor in text:
                          selinux_c.write_text(text.replace(anchor, anchor + block, 1))
                      elif '#include "selinux_defs.h"\n' in text:
                          selinux_c.write_text(text.replace('#include "selinux_defs.h"\n', '#include "selinux_defs.h"\n' + block, 1))
                      else:
                          raise SystemExit(f"{selinux_c} missing SELinux compatibility insertion anchor")
                      print("Injected ReSukiSU SUSFS SELinux hide compatibility globals")

              sucompat_c = kernel_dir / "feature/sucompat.c"
              if sucompat_c.exists():
                  text = sucompat_c.read_text()
                  marker = "\n// dead code\n"
                  guard = "#endif /* CONFIG_KSU_SUSFS */\n"
                  if marker in text and guard not in text:
                      before_marker = text.split(marker, 1)[0]
                      if preprocessor_delta(before_marker) > 0:
                          sucompat_c.write_text(text.replace(marker, "\n" + guard + marker, 1))
                          print("Closed missing ReSukiSU builtin CONFIG_KSU_SUSFS block in feature/sucompat.c")

              sulog_event_c = kernel_dir / "sulog/event.c"
              if sulog_event_c.exists():
                  text = sulog_event_c.read_text()
                  old = "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, USER_ARG_NULL, gfp);"
                  new = "\n".join([
                      "    /* ABK: builtin SUSFS ksu_sulog_capture() expects argv_user as a pointer. */",
                      "#ifdef CONFIG_KSU_SUSFS",
                      "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, NULL, gfp);",
                      "#else",
                      "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, USER_ARG_NULL, gfp);",
                      "#endif",
                  ])
                  if old in text and "builtin SUSFS ksu_sulog_capture()" not in text:
                      sulog_event_c.write_text(text.replace(old, new, 1))
                      print("Fixed ReSukiSU builtin sulog grant_root argv type for CONFIG_KSU_SUSFS")
          PY
    
      
      # - name: Apply HOOK
      #   run: |
      #     cd kernel_workspace/common
      #     if [ "${{ github.event.inputs.HOOK }}" = "kprobe" ]; then
      #     echo "调用 kprobe 钩子"
      #     elif [ "${{ github.event.inputs.HOOK }}" = "manual" ]; then
      #     cp ../SukiSU_patch/hooks/scope_min_manual_hooks_v1.6.patch ./
      #     echo "调用 manual 钩子"
      #     patch -p1 -F 3 < scope_min_manual_hooks_v1.6.patch
      #     elif [ "${{ github.event.inputs.HOOK }}" = "tracepoint" ]; then
      #     cp ../SukiSU_patch/hooks/sukisu_tracepoint_hooks_v1.1.patch ./
      #     echo "调用 tracepoint 钩子"
      #     patch -p1 -F 3 < sukisu_tracepoint_hooks_v1.1.patch
      #     fi
      
      # Custom kernel build time, without adding #1 SMP PREEMPT 自定义内核构建时间，不要加入#1 SMP PREEMPT
      - name: Custom BUILD_TIME
        shell: bash
        run: |
          INPUT_TIME="${{ github.event.inputs.BUILD_TIME }}"
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "F" && "$INPUT_TIME" != "f" ]]; then
            DATESTR="$INPUT_TIME"
            echo "Using input BUILD_TIME: $DATESTR"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
            echo "Using UTC time as fallback: $DATESTR"
          fi
          echo "KBUILD_BUILD_TIMESTAMP=${DATESTR}" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"
          cd kernel_workspace/
          for f in common/scripts/mkcompile_h; do
            if [ -f "$f" ]; then
              echo "Patching mkcompile_h with BUILD_TIME=$DATESTR"
              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\(.*?\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          done
          
      - name: oneplus
        if: ${{inputs.enable_oneplus }}
        run: |
         cd kernel_workspace
         git clone https://$TOKEN@github.com/JiuGeFaCai/sturdy-journey.git
         cp ./sturdy-journey/fix.patch ./common/
         cd ./common
         patch -p1 -F 3 < fix.patch

      - name: lsm
        if: ${{inputs.enable_lsm }}
        run: |
         cd kernel_workspace
         git clone https://$TOKEN@github.com/JiuGeFaCai/sturdy-journey.git
         cp ./sturdy-journey/lsm.patch ./common/
         cd ./common
         patch -p1 -F 3 < lsm.patch

      - name: Kernel Version Handling
        run: |
          cd kernel_workspace
          # 获取内核 Android 版本号(KANDROID_VERSION)以及内核版本号(KERNEL_VERSION)
          for f in ./common/build.config.constants ./common/build.config.common; do
            if [ -f "$f" ]; then
              BRANCH=$(grep -m1 '^BRANCH=' "$f" | cut -d= -f2)
              [ -n "$BRANCH" ] && break
            fi
          done

          if [ -n "$BRANCH" ]; then
            echo "KANDROID_VERSION=${BRANCH%-*}" >> $GITHUB_ENV
            echo "KERNEL_VERSION=${BRANCH#*-}" >> $GITHUB_ENV
          else
            echo "No BRANCH found in build.config files"
          fi

          # 从 Makefile 获取完整内核版本号(TKERNEL_VERSION)以及可选的修改内核等级
          ORIG_VERSION=$(awk '/^VERSION =/ {v=$3} /^PATCHLEVEL =/ {p=$3} /^SUBLEVEL =/ {s=$3} END {print v"."p"."s}' ./common/Makefile)

          # 强制修改 SUBLEVEL(内核等级)，默认关闭
          # sed -i 's/^SUBLEVEL[[:space:]]*=[[:space:]]*.*/SUBLEVEL = 99/' ./common/Makefile

          # 读取修改后的版本
          NEW_VERSION=$(awk '/^VERSION =/ {v=$3} /^PATCHLEVEL =/ {p=$3} /^SUBLEVEL =/ {s=$3} END {print v"."p"."s}' ./common/Makefile)

          if [ "$ORIG_VERSION" != "$NEW_VERSION" ]; then
            echo "Kernel Version:$ORIG_VERSION->$NEW_VERSION"
            echo "TKERNEL_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          else
            echo "Kernel Version:$ORIG_VERSION No changes"
            echo "TKERNEL_VERSION=$ORIG_VERSION" >> $GITHUB_ENV
          fi


          # 内核版本的数字转换(对比用)
          echo "KV1=${BRANCH#*-}"       | cut -d. -f1 >> $GITHUB_ENV
          echo "KV2=${BRANCH#*-}"       | tr -d '.' >> $GITHUB_ENV
          echo "KV3=${NEW_VERSION}"     | tr -d '.' >> $GITHUB_ENV

      - name: Apply Unicode bypass Fix
        if: ${{inputs.enable_Unicode_bypass_Fix }}
        run: |
         cd kernel_workspace
         git clone https://$TOKEN@github.com/JiuGeFaCai/Unicode_bypass_Fix.git
         cd ./common
         if [ "$KV1" -lt 6 ]; then
            # cp ../Unicode_bypass_Fix/unicode_bypass_fix_2_6.1-.patch ./
            cp ../Unicode_bypass_Fix/unicode_bypass_fix_6.1-.patch ./
            echo "Patching unicode!"
            patch -p1 --forward < "unicode_bypass_fix_6.1-.patch" || true
          else
            cp ../Unicode_bypass_Fix/unicode_bypass_fix_6.1+.patch ./
            echo "Patching unicode!"
            patch -p1 --forward < "unicode_bypass_fix_6.1+.patch"
          fi

      - name: Apply LSM_BBG
        if: ${{ github.event.inputs.LSM == 'true' }}
        run: |
          cd kernel_workspace/common
          echo "正在启用内核级基带保护支持…"
          curl -LSs https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' ./security/Kconfig


      - name: Apply ZRAM
        if: ${{ github.event.inputs.ZRAM == 'true' }}
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/kernel_workspace/SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}"
          cd kernel_workspace/common
          echo "正在打lz4kd补丁"
          patch -p1 -F 3 < "${PATCH_DIR}/lz4kd.patch" || true
          echo 'lz4kd_patch完成'
          echo "正在打lz4k_oplus补丁"
          patch -p1 -F 3 < "${PATCH_DIR}/lz4k_oplus.patch" || true
          echo 'lz4k_oplus_patch完成'
         
      - name: Add SUSFS Configuration Settings
        run: |
          cd kernel_workspace
          CONFIG_FILE=./common/arch/arm64/configs/gki_defconfig
          # SukiSU Ultra配置
          echo "CONFIG_KSU=y" >> "$CONFIG_FILE"

          # KPM配置
          echo "CONFIG_KPM=y" >> "$CONFIG_FILE"

          # LSM配置*
          if [ "${{ github.event.inputs.LSM }}" = "true" ]; then
            echo "CONFIG_BBG=y" >> "$CONFIG_FILE"
          fi

          # # HOOK配置
          # if [ "${{ github.event.inputs.HOOK }}" = "kprobe" ]; then
          #   echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> "$CONFIG_FILE"
          #   echo "CONFIG_KPROBES=y" >> "$CONFIG_FILE"
          #   echo "CONFIG_KSU_KPROBES_HOOK=y" >> "$CONFIG_FILE"
          # elif [ "${{ github.event.inputs.HOOK }}" = "manual" ]; then
          #   echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
          #   echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$CONFIG_FILE"
          # elif [ "${{ github.event.inputs.HOOK }}" = "tracepoint" ]; then
          #   echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
          #   echo "CONFIG_KSU_TRACEPOINT_HOOK=y" >> "$CONFIG_FILE"
          # fi

          # SUSFS配置
          echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"


          # ZRAM配置*
          if [ "${{ github.event.inputs.ZRAM }}" = "true" ]; then
            echo "CONFIG_CRYPTO_LZ4HC=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4K=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4KD=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_842=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4K_OPLUS=y" >> "$CONFIG_FILE"
            echo "CONFIG_ZRAM_WRITEBACK=y" >> "$CONFIG_FILE"
          fi
         
          # Remove check_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          if [ -f "BUILD.bazel" ]; then
          sed -i '/"protected_exports_list": "android\/abi_gki_protected_exports_aarch64"/d' BUILD.bazel
          fi
          git add -A && git commit -a -m "BUILD Kernel"

      - name: Add make name
        if: ${{ github.event.inputs.KERNEL_NAME != '' }}
        run: |
         cd kernel_workspace
         if [ "${{ github.event.inputs.KERNEL_VERSION }}" != "6.6" ]; then
         sed -i '$s|echo "\$res"|echo "\${{ github.event.inputs.KERNEL_NAME }}"|' ./common/scripts/setlocalversion
         else
         sed -i '$s|${file_localversion}|${{ github.event.inputs.KERNEL_NAME }}|' ./common/scripts/setlocalversion
         fi
   
      - name: Build kernel
        run: |
         cd kernel_workspace
         if [ -e build/build.sh ]; then
           LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh
         else
           tools/bazel run --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist -- --dist_dir=dist
         fi

      - name: Make AnyKernel3
        run: |
         OUTDIR=kernel_workspace/out/${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}/dist
         if [ ! -e $OUTDIR ]; then
           OUTDIR=kernel_workspace/dist
         fi
         mkdir output
         cp $OUTDIR/Image ./output/
         cd output
         curl -LSs "https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.2/patch_linux" -o patch_linux
         chmod +x patch_linux
         ./patch_linux
         rm -f Image
         mv oImage Image
         cd ..
         git clone https://github.com/WildPlusKernel/AnyKernel3.git --depth=1
         rm -rf ./AnyKernel3/.git
         cp ./output/Image ./AnyKernel3/

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
         name: ReSuKiSu_${{ env.KSUVER }}_${{ github.event.inputs.ANDROID_VERSION }}-(${{ env.TKERNEL_VERSION }})
         path: ./AnyKernel3/*
         
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
         name: Image
         path: ./output/*
